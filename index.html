<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>CyberStream v4.2</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: monospace; color: #0f0; }
        canvas { width: 100vw; height: 100vh; display: block; }
        .overlay { position: absolute; top: 10px; left: 10px; font-size: 10px; text-shadow: 0 0 5px #0f0; pointer-events: none; }
        .scanline { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; pointer-events: none; }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="overlay">>> SIGNAL_ANALYSIS: ACTIVE<br>>> ENCRYPTION: BYPASSING...<br>>> CORE_TEMP: 32C</div>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let w, h;
        let bars = 40;
        let data = Array(bars).fill(0);

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }

        function draw() {
            // Efecto ghosting/persistencia
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, w, h);

            const barWidth = w / bars;

            for (let i = 0; i < bars; i++) {
                // Algoritmo matemático para simular ritmo (Seno + Ruido)
                let target = Math.sin(Date.now() * 0.002 + i * 0.5) * 50 + 50;
                target += Math.random() * 40; // Añade "nerviosismo" a la barra
                
                // Suavizado de movimiento (interpolación)
                data[i] += (target - data[i]) * 0.2;

                const barHeight = (data[i] / 100) * (h * 0.7);
                
                // Estilo Verde Neón Puro
                ctx.fillStyle = '#0f0';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#0f0';
                
                // Dibujar bloque de la barra
                ctx.fillRect(i * barWidth, h - barHeight, barWidth - 2, barHeight);
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
