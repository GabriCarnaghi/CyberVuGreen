<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CyberVu Green Edition</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #0f0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100vw; }
        
        #canvas-wrapper { 
            position: relative; 
            width: 90%; 
            height: 60%; 
            border: 2px solid #040; 
            background: #000; 
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); 
            overflow: hidden;
        }

        canvas { width: 100%; height: 100%; }
        
        .ui-label { 
            position: absolute; 
            font-size: 9px; 
            color: #0f0; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            opacity: 0.7;
        }

        #msg { 
            margin-top: 20px;
            border: 1px solid #0f0; 
            padding: 10px 20px; 
            cursor: pointer; 
            text-shadow: 0 0 5px #0f0;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
    </style>
</head>
<body onclick="iniciarAudio()">

    <div id="canvas-wrapper">
        <div class="ui-label" style="top:5px; left:5px;">System: Active</div>
        <div class="ui-label" style="top:5px; right:5px;">Mode: 2D_Spectrum</div>
        <div class="ui-label" style="bottom:5px; left:50%; transform:translateX(-50%);">>> Frequency_Analysis_v4.2 <<</div>
        <canvas id="canvas"></canvas>
    </div>
    
    <div id="msg">INITIALIZE_LINK</div>

<script>
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var msg = document.getElementById('msg');
        var audioCtx, analyser, source, dataArray, bufferLength;

        function iniciarAudio() {
            try {
                // 1. Compatibilidad total de AudioContext para iOS viejo
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();

                // 2. Compatibilidad total de getUserMedia (el truco para iPhone 5)
                navigator.getUserMedia = (navigator.getUserMedia ||
                                          navigator.webkitGetUserMedia ||
                                          navigator.mozGetUserMedia ||
                                          navigator.msGetUserMedia);

                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                if (navigator.getUserMedia) {
                    navigator.getUserMedia({ audio: true }, 
                        function(stream) {
                            msg.style.display = 'none';
                            analyser = audioCtx.createAnalyser();
                            analyser.fftSize = 128;
                            source = audioCtx.createMediaStreamSource(stream);
                            source.connect(analyser);
                            bufferLength = analyser.frequencyBinCount;
                            dataArray = new Uint8Array(bufferLength);
                            dibujar();
                        }, 
                        function(err) {
                            alert("Error Mic: " + err.name);
                        }
                    );
                } else {
                    alert("Tu Safari no soporta micrófono web.");
                }
            } catch (e) {
                alert("Error de inicio: " + e);
            }
            window.scrollTo(0, 1);
        }

        function dibujar() {
            requestAnimationFrame(dibujar);
            analyser.getByteFrequencyData(dataArray);

            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            var barWidth = (canvas.width / bufferLength);
            var x = 0;

            for(var i = 0; i < bufferLength; i++) {
                var barHeight = dataArray[i] * 1.3;
                ctx.fillStyle = "#0f0";
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#0f0";
                ctx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
                x += barWidth;
            }
        }
    </script>
</body>
</html>
