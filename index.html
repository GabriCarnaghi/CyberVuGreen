<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>CYBERDECK_LINK_0x4F2</title>
    <style>
        :root { --cian: #0ff; --magenta: #f0f; --bg: #000; --dim: #055; }
        body { background: var(--bg); color: var(--cian); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; font-size: 8px; }
        
        /* Patrón hexagonal de fondo (muy sutil) */
        body::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background-image: linear-gradient(30deg, var(--dim) 1px, transparent 1px), linear-gradient(150deg, var(--dim) 1px, transparent 1px), linear-gradient(270deg, var(--dim) 1px, transparent 1px);
            background-size: 15px 15px; opacity: 0.15; pointer-events: none;
        }

        .container {
            display: grid;
            grid-template-columns: 140px 1fr 140px;
            grid-template-rows: 25px 1fr 1fr 25px;
            height: 100vh; padding: 5px; gap: 4px; box-sizing: border-box;
            position: relative; z-index: 1;
        }

        .panel { border: 1px solid var(--dim); background: rgba(0, 10, 10, 0.8); position: relative; overflow: hidden; box-shadow: inset 0 0 10px rgba(0,255,255,0.1); }
        .panel::before { content: ""; position: absolute; top: 0; left: 0; width: 5px; height: 5px; border-left: 2px solid var(--magenta); border-top: 2px solid var(--magenta); }

        /* Cabecera y Footer */
        header, footer { grid-column: span 3; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--cian); padding: 0 10px; font-weight: bold; }
        footer { border-top: 1px solid var(--cian); border-bottom: none; font-size: 7px; color: #5aa; }

        /* Doble Log (Cian y Magenta) */
        .sidebar-l { grid-row: span 2; display: flex; flex-direction: column; font-size: 7px; line-height: 1.1; }
        .log-c { color: var(--cian); height: 50%; overflow: hidden; padding: 3px; }
        .log-m { color: var(--magenta); height: 50%; overflow: hidden; padding: 3px; border-top: 1px dashed var(--dim); }

        /* Centro: Radar y Huella */
        .main-visuals { grid-column: 2; grid-row: 2 / span 2; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid var(--magenta); box-shadow: inset 0 0 15px rgba(255,0,255,0.15); }
        
        /* Radar Circular */
        #radar-display { width: 100px; height: 100px; position: relative; display: flex; justify-content: center; align-items: center; }
        #radar-display canvas { border-radius: 50%; border: 1px solid var(--cian); }
        
        /* Huella Dactilar HUD */
        #finger-print { width: 60px; height: 80px; position: relative; margin-top: 10px; border: 1px dashed var(--magenta); }
        #finger-print::after { content: "VERIFYING..."; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); font-size: 7px; color: var(--magenta); animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Derecha: Hardware Monitor */
        .sidebar-r { grid-row: span 2; padding: 5px; display: flex; flex-direction: column; gap: 6px; }
        .stat-box { border: 1px solid var(--dim); padding: 3px; background: rgba(0,0,0,0.8); }
        .mini-bar { height: 4px; background: var(--dim); margin-top: 3px; position: relative; }
        .fill-c { height: 100%; background: var(--cian); transition: width 0.3s; }
        .fill-m { height: 100%; background: var(--magenta); transition: width 0.3s; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <span>DECK_ID: G-C_05</span>
        <span style="color:var(--magenta)">LIVE_LINK: [0x4F2]</span>
        <span id="clock">00:00:00</span>
    </header>

    <div class="panel sidebar-l">
        <div class="log-c" id="log-cian"></div>
        <div class="log-m" id="log-magenta"></div>
    </div>

    <div class="panel main-visuals">
        <div id="radar-display">
            <canvas id="canvas-radar"></canvas>
            <div style="font-size: 7px; position: absolute; color: var(--cian);">RADAR_SYNC</div>
        </div>
        <div id="finger-print">
            <canvas id="canvas-finger"></canvas>
        </div>
        <div style="font-size: 8px; margin-top: 5px;">BIOMETRIC_MATRIX</div>
    </div>

    <div class="panel sidebar-r">
        <div class="stat-box">CORE_TEMP: <span id="t-val"></span>C <div class="mini-bar"><div id="t-bar" class="fill-c"></div></div></div>
        <div class="stat-box" style="border-color:var(--magenta)">NET_LINK: [STABLE] <div class="mini-bar" style="background:rgba(255,0,255,0.1);"><div id="n-bar" class="fill-m" style="width:95%"></div></div></div>
        <div class="stat-box">CPU_LOAD: <span id="c-val"></span>% <div class="mini-bar"><div id="c-bar" class="fill-c"></div></div></div>
        <div style="font-size: 7px; text-align: center; margin-top: 5px;">ACCESSING SECTOR:<br>0xFF-12</div>
    </div>

    <footer>
        <span>SECTOR: ACTIVE</span>
        <span>LINK: UPLINK=1 // DOWNLINK=1</span>
        <span>STATUS: ENCRYPTED</span>
    </footer>
</div>

<script>
    // 1. Reloj Real-Time
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
    }
    setInterval(updateClock, 1000);

    // 2. Doble Log (Cian y Magenta)
    const logCian = document.getElementById('log-cian');
    const logMagenta = document.getElementById('log-magenta');
    const phrases = ["0x1A4F", "GET /api", "OVERRIDE", "TCP_EST", "DB_DUMP", "HEX_V8", "SYNC_ERR", "KILL_PROC"];
    
    function addLog(el, phrasesArray, color) {
        const line = document.createElement('div');
        line.innerHTML = `> ${phrasesArray[Math.floor(Math.random()*phrasesArray.length)]}: ${(Math.random()*999).toFixed(0)}`;
        el.appendChild(line);
        if(el.childNodes.length > 15) el.removeChild(el.firstChild);
        el.scrollTop = el.scrollHeight;
    }
    setInterval(() => addLog(logCian, phrases, 'cian'), 600);
    setInterval(() => addLog(logMagenta, phrases, 'magenta'), 400);

    // 3. Radar Circular Táctico
    const radar = document.getElementById('canvas-radar');
    const ctxR = radar.getContext('2d');
    radar.width = 90; radar.height = 90;
    let offset = 0;
    function drawRadar() {
        ctxR.clearRect(0, 0, radar.width, radar.height);
        ctxR.strokeStyle = '#0ff';
        ctxR.lineWidth = 1;
        ctxR.beginPath();
        const center = radar.width / 2;
        const radius = center - 5;
        for(let a=0; a<360; a++) {
            let r = radius + Math.sin(a*0.1 + offset) * 10;
            let x = center + Math.cos(a * Math.PI / 180) * r;
            let y = center + Math.sin(a * Math.PI / 180) * r;
            if(a===0) ctxR.moveTo(x, y); else ctxR.lineTo(x, y);
        }
        ctxR.closePath(); ctxR.stroke(); offset += 0.05;
        requestAnimationFrame(drawRadar);
    }
    drawRadar();

    // 4. Huella Dactilar (Abstracta)
    const finger = document.getElementById('canvas-finger');
    const ctxF = finger.getContext('2d');
    finger.width = 60; finger.height = 70;
    function drawFinger() {
        ctxF.clearRect(0, 0, finger.width, finger.height);
        ctxF.strokeStyle = '#f0f';
        ctxF.lineWidth = 2;
        for(let i=0; i<4; i++) {
            ctxF.beginPath();
            ctxF.arc(finger.width/2, finger.height/2 + i*5, 10 + i*5, 0, Math.PI * 2);
            ctxF.stroke();
        }
        // Línea de escaneo
        ctxF.fillStyle = 'rgba(255,0,255,0.2)';
        ctxF.fillRect(0, (Date.now() % 3000) / 3000 * finger.height, finger.width, 10);
        requestAnimationFrame(drawFinger);
    }
    drawFinger();

    // 5. Animación de Barras de Hardware
    setInterval(() => {
        const t = Math.floor(Math.random() * 20) + 30;
        document.getElementById('t-val').innerText = t;
        document.getElementById('t-bar').style.width = t + "%";
        const cpu = Math.floor(Math.random() * 50) + 10;
        document.getElementById('c-val').innerText = cpu;
        document.getElementById('c-bar').style.width = cpu + "%";
    }, 2500);

</script>
</body>
</html>
