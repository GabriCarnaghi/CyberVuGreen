<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>CYBERDECK_OS</title>
    <style>
        body { 
            background-color: #000; 
            color: #0f0; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            overflow: hidden; 
            font-size: 10px;
            text-transform: uppercase;
        }

        /* Contenedor Principal */
        .deck-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            gap: 5px;
            padding: 5px;
            box-sizing: border-box;
        }

        /* Módulos */
        .module {
            border: 1px solid #040;
            padding: 5px;
            position: relative;
            overflow: hidden;
            background: rgba(0, 10, 0, 0.5);
        }

        .module-title {
            position: absolute;
            top: 0; right: 5px;
            font-size: 8px;
            color: #0a0;
            background: #000;
            padding: 0 3px;
        }

        /* Terminal de Código (Scroll Infinito) */
        #code-terminal {
            grid-row: span 2;
            color: #0f0;
            font-size: 9px;
            line-height: 1.1;
        }

        /* Mapa de red / Gráfico */
        #grid-display {
            display: flex;
            justify-content: center;
            align-items: center;
            border-color: #0f0;
        }

        /* Status bars */
        .status-line { margin-bottom: 4px; }
        .bar-bg { width: 100%; height: 6px; background: #010; border: 1px solid #040; margin-top: 2px; }
        .bar-fill { height: 100%; background: #0f0; width: 0%; transition: width 0.5s; }

        /* Escáner de líneas horizontal */
        .scanline {
            width: 100%; height: 2px; background: rgba(0, 255, 0, 0.1);
            position: absolute; top: 0; left: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan { from { top: 0%; } to { top: 100%; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="deck-wrapper">
        
        <div class="module" id="code-terminal">
            <div class="module-title">SYS_LOG_V8.4</div>
            <div id="log-content"></div>
        </div>

        <div class="module">
            <div class="module-title">HARDWARE_MONITOR</div>
            <div class="status-line">
                CPU_LOAD: <span id="cpu-val">22%</span>
                <div class="bar-bg"><div id="cpu-bar" class="bar-fill"></div></div>
            </div>
            <div class="status-line" style="margin-top:10px;">
                NET_LINK: <span id="net-val">STABLE</span>
                <div class="bar-bg"><div id="net-bar" class="bar-fill" style="width: 90%"></div></div>
            </div>
        </div>

        <div class="module" id="grid-display">
            <div class="module-title">SEC_MATRIX</div>
            <canvas id="matrix-canvas"></canvas>
        </div>

    </div>

    <script>
        // --- LOG DE CÓDIGO ---
        const logContent = document.getElementById('log-content');
        const phrases = [
            "Initializing neural_link...", "Accessing encrypted_sector...", "Packet bypass: OK",
            "Root_access granted", "Syncing with Biqu_B1...", "Temp_monitor: 215C",
            "Overriding security_v3", "Fetching datastream...", "Buffer_overflow detected",
            "Stability: 99.8%", "Tracing IP: 192.168.1.104", "Hex_dump complete"
        ];

        setInterval(() => {
            const p = document.createElement('div');
            p.textContent = ">> " + phrases[Math.floor(Math.random() * phrases.length)];
            logContent.appendChild(p);
            if (logContent.childNodes.length > 25) logContent.removeChild(logContent.firstChild);
        }, 800);

        // --- BARRAS DE ESTADO ---
        setInterval(() => {
            const cpu = Math.floor(Math.random() * 40) + 10;
            document.getElementById('cpu-val').textContent = cpu + "%";
            document.getElementById('cpu-bar').style.width = cpu + "%";
        }, 2000);

        // --- MINI MATRIX / GRID ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        function resizeMatrix() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeMatrix);
        resizeMatrix();

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0';
            ctx.font = '8px monospace';
            for(let i=0; i<10; i++) {
                ctx.fillText(Math.random() > 0.5 ? "1" : "0", Math.random()*canvas.width, Math.random()*canvas.height);
            }
            requestAnimationFrame(drawMatrix);
        }
        drawMatrix();
    </script>
</body>
</html>
