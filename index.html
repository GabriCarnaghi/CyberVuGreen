<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>CYBERDECK_OVERLOAD_V2</title>
    <style>
        :root { --neon: #0f0; --dim: #040; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; font-size: 9px; }
        
        /* Patrón de fondo para llenar el vacío */
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: radial-gradient(var(--dim) 1px, transparent 1px);
            background-size: 15px 15px; opacity: 0.2; pointer-events: none;
        }

        .container {
            display: grid;
            grid-template-columns: 140px 1fr 140px;
            grid-template-rows: 30px 1fr 60px;
            height: 100vh; padding: 5px; gap: 4px; box-sizing: border-box;
            position: relative; z-index: 1;
        }

        .panel { border: 1px solid var(--dim); background: rgba(0,10,0,0.8); position: relative; overflow: hidden; }
        .panel::before { content: ""; position: absolute; top: 0; left: 0; width: 5px; height: 5px; border-left: 2px solid var(--neon); border-top: 2px solid var(--neon); }

        /* Cabecera */
        header { grid-column: span 3; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon); padding: 0 10px; font-weight: bold; }

        /* Columna Izquierda: Log Dinámico */
        .sidebar-l { grid-row: span 1; font-size: 7px; line-height: 1.2; padding: 5px; }

        /* Centro: Main Visualizer */
        .main-display { display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid var(--neon); box-shadow: inset 0 0 15px var(--dim); }
        #scope { width: 100%; height: 80px; }

        /* Derecha: Stats Rápidos */
        .sidebar-r { padding: 5px; display: flex; flex-direction: column; gap: 8px; }
        .stat-box { border: 1px solid var(--dim); padding: 3px; background: #010; }
        .mini-bar { height: 4px; background: var(--dim); margin-top: 3px; position: relative; }
        .fill { height: 100%; background: var(--neon); transition: width 0.3s; }

        /* Footer: Mapa de sectores */
        footer { grid-column: span 3; display: grid; grid-template-columns: repeat(20, 1fr); gap: 2px; padding: 5px; }
        .sector { background: var(--dim); height: 8px; opacity: 0.3; }
        .sector.active { background: var(--neon); opacity: 1; box-shadow: 0 0 5px var(--neon); }

        .glitch-text { animation: blink 0.2s infinite; color: #fff; font-weight: bold; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <span>DECK_ID: G-C_05</span>
        <span class="glitch-text">LIVE_LINK</span>
        <span id="clock">00:00:00</span>
    </header>

    <div class="panel sidebar-l" id="log">>> INITIALIZING...</div>

    <div class="panel main-display">
        <canvas id="scope"></canvas>
        <div style="font-size: 8px; margin-top: 10px;">CORE_WAVEFORM_ANALYSIS</div>
        <div id="coords" style="font-size: 7px; opacity: 0.6;">X:00 Y:00 Z:00</div>
    </div>

    <div class="panel sidebar-r">
        <div class="stat-box">TEMP: <span id="t-val">32</span>°C <div class="mini-bar"><div id="t-bar" class="fill" style="width:40%"></div></div></div>
        <div class="stat-box">RAM: <span id="r-val">88</span>% <div class="mini-bar"><div id="r-bar" class="fill" style="width:88%"></div></div></div>
        <div class="stat-box">SIGNAL: <div class="mini-bar"><div id="s-bar" class="fill" style="width:95%"></div></div></div>
        <div style="font-size: 7px; text-align: center; margin-top: 10px;">ENCRYPTING...<br>[|||||||---]</div>
    </div>

    <footer class="panel" id="memory-map"></footer>
</div>

<script>
    // 1. Reloj Real-Time
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
    }
    setInterval(updateClock, 1000);

    // 2. Log de Datos Complejo
    const log = document.getElementById('log');
    const codes = ["0x4F2", "GET /api/v1", "SYNC_ERR", "OVERRIDE", "TCP_EST", "DB_DUMP", "HEX_V8", "KILL_PROC"];
    setInterval(() => {
        const line = document.createElement('div');
        line.innerHTML = `> ${codes[Math.floor(Math.random()*codes.length)]}: <span style="color:#fff">${(Math.random()*9999).toFixed(0)}</span>`;
        log.appendChild(line);
        if(log.childNodes.length > 20) log.removeChild(log.firstChild);
        log.scrollTop = log.scrollHeight;
    }, 400);

    // 3. Osciloscopio Central
    const canvas = document.getElementById('scope');
    const ctx = canvas.getContext('2d');
    let offset = 0;
    function drawScope() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#0f0';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let x=0; x<canvas.width; x++) {
            let y = canvas.height/2 + Math.sin(x*0.05 + offset) * 20 + Math.sin(x*0.02) * 10;
            if(x===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
        offset += 0.1;
        
        // Update Coords ficticias
        document.getElementById('coords').innerText = `X:${(Math.random()*99).toFixed(0)} Y:${offset.toFixed(1)} Z:04`;
        requestAnimationFrame(drawScope);
    }
    drawScope();

    // 4. Mapa de sectores (Footer)
    const footer = document.getElementById('memory-map');
    for(let i=0; i<60; i++) {
        const sec = document.createElement('div');
        sec.className = 'sector';
        footer.appendChild(sec);
    }
    setInterval(() => {
        const sectors = document.querySelectorAll('.sector');
        sectors.forEach(s => s.classList.remove('active'));
        for(let i=0; i<10; i++) {
            sectors[Math.floor(Math.random()*60)].classList.add('active');
        }
    }, 150);

    // 5. Animación de Barras
    setInterval(() => {
        const r = Math.random() * 100;
        document.getElementById('r-val').innerText = r.toFixed(0);
        document.getElementById('r-bar').style.width = r + "%";
    }, 3000);
</script>
</body>
</html>
